version: '3.8'

services:
  # OpenFGA — Authorization Engine
  openfga:
    image: openfga/openfga:v1.8.0
    container_name: openfga
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:openfga@postgres:5432/openfga?sslmode=disable
      OPENFGA_PLAYGROUND_ENABLED: "true"
      OPENFGA_LOG_FORMAT: json
      OPENFGA_LOG_LEVEL: info
    ports:
      - "8080:8080"   # gRPC
      - "8081:8081"   # HTTP
      - "3000:3000"   # Playground
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-platform

  # PostgreSQL — OpenFGA datastore
  postgres:
    image: postgres:16-alpine
    container_name: openfga-postgres
    environment:
      POSTGRES_USER: openfga
      POSTGRES_PASSWORD: openfga
      POSTGRES_DB: openfga
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - auth-platform

  # Dex IdP — Identity Provider
  dex:
    image: dexidp/dex:v2.41.1
    container_name: dex
    command: dex serve /etc/dex/config.yaml
    volumes:
      - ./config/dex.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"   # Dex HTTP
      - "5557:5557"   # Dex gRPC
      - "5558:5558"   # Dex telemetry
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5558/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-platform

  # OpenLDAP — Voor lokale testing
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "Bank Platform"
      LDAP_DOMAIN: "platform.bank.local"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_BASE_DN: "dc=platform,dc=bank,dc=local"
    ports:
      - "389:389"
      - "636:636"
    networks:
      - auth-platform

  # phpLDAPadmin — LDAP beheer UI
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "6443:80"
    depends_on:
      - openldap
    networks:
      - auth-platform

volumes:
  postgres_data:

networks:
  auth-platform:
    driver: bridge
